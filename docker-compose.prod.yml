

services:
  backend:
    image: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/awb-backend:${BUILD_TAG:-latest}
    container_name: awb-backend
    env_file:
      - .env
      - backend.env
    environment:
      # postgres_db et keycloak sont resolus via le DNS du reseau docker
      DB_HOST: postgres_db
    ports:
      - "8000:8000"
    networks:
      - app-network
    restart: unless-stopped
    # PAS de depends_on : les services infra sont dans un autre compose
    # Le restart: unless-stopped + healthcheck cote infra suffisent

  frontend:
    image: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/awb-frontend:${BUILD_TAG:-latest}
    container_name: awb-frontend
    ports:
      - "5173:80"
    networks:
      - app-network
    restart: unless-stopped
    # PAS de depends_on sur backend non plus :
    # le backend etant recree avant frontend, l ordre est garanti
    # par les noms passes au pipeline (backend frontend).

networks:
  # Reseau EXTERNE cree par docker-compose.infra.yml
  # backend et frontend rejoignent ce reseau pour parler a
  # postgres_db et keycloak via leurs noms DNS docker
  app-network:
    name: app-network
    external: true
```
